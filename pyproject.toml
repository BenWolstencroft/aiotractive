[tool.ruff]
target-version = "py310"

lint.select = ["ALL"]

lint.ignore = [
    "ANN001",   # Missing type annotation for function argument
    "ANN002",   # Missing type annotation
    "ANN003",   # Missing type annotation
    "ANN201",   # Missing return type annotation for public function
    "ANN202",   # Missing return type annotation for private function
    "ANN204",   # Missing return type annotation for special method
    "COM812",   # Trailing comma missing
    "D203",     # 1 blank line required before class docstring
    "D213",     # Multi-line docstring summary should start at the second line
    "EM101",    # Exception must not use a string literal, assign to variable first
    "PLR0913",  # Too many arguments in function definition
    "RUF012",   # Mutable class attributes should be annotated with typing.ClassVar
    "TRY003",   # Avoid specifying long messages outside the exception class
    "TRY301",   # Abstract raise to an inner function
]

[tool.ruff.lint.mccabe]
max-complexity = 25

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "D103",     # Missing docstring in public function (test functions are self-documenting)
    "S101",     # Use of assert detected (expected in tests)
    "S105",     # Possible hardcoded password (test data)
    "SLF001",   # Private member accessed (testing internals)
    "PLR2004",  # Magic value used in comparison (test assertions)
    "INP001",   # Implicit namespace package (tests don't need __init__.py)
    "E501",     # Line too long (test readability)
    "D205",     # 1 blank line required between summary line and description
    "D212",     # Multi-line docstring summary should start at first line
    "PT006",    # Wrong type passed to first argument of pytest.mark.parametrize
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["aiotractive"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
